name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-electron/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-electron
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend-electron
        run: npm run -s test

      - name: Run frontend typecheck
        working-directory: frontend-electron
        run: npx tsc --noEmit

      - name: Build frontend renderer bundle
        working-directory: frontend-electron
        run: npm run -s build

  website-visual-regression:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Run website visual test lint subset
        working-directory: website
        run: npx eslint tests/visual/home.spec.ts src/components/sections/Hero.tsx src/components/ui/ScrambleText.tsx

      - name: Install Playwright browser
        working-directory: website
        run: npx playwright install chromium

      - name: Build website
        working-directory: website
        run: npm run -s build

      - name: Run visual regression suite
        working-directory: website
        run: npm run test:visual

      - name: Upload visual report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: website/playwright-report
